<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Watch Weather Sandbox</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="workspace">
    <section class="control-panel">
      <div class="panel-block">
        <p class="eyebrow">Magic Watch</p>
        <h1>Weather Shortcut Sandbox</h1>
        <p class="summary">把主页环第 4 页做成可直接拖拽和调尺寸的视觉沙盘，先把参数调准，再回译到 LVGL。</p>
      </div>

      <div class="panel-block">
        <p class="label">屏幕预设</p>
        <div class="preset-row">
          <button type="button" class="preset-button is-active" data-preset="xiaomi-197">Xiaomi 1.97</button>
          <button type="button" class="preset-button" data-preset="taller-alt">Taller Alt</button>
        </div>
      </div>

      <div class="panel-block">
        <p class="label">编辑模式</p>
        <div class="action-row">
          <button type="button" id="toggle-edit-mode" class="action-button">开启布局编辑</button>
          <button type="button" id="reset-layout" class="action-button action-button-secondary">重置当前预设</button>
        </div>
        <p class="helper-text">开启后：拖动组件移动位置，拉右下角圆点调整大小。图标保持正方形，睡眠和步数组件保持正方形。</p>
      </div>

      <div class="panel-block">
        <p class="label">当前参数</p>
        <dl class="spec-list">
          <div><dt>Watch</dt><dd id="spec-watch"></dd></div>
          <div><dt>Safe</dt><dd id="spec-safe"></dd></div>
          <div><dt>Stage</dt><dd id="spec-stage"></dd></div>
          <div><dt>Gap</dt><dd id="spec-gap"></dd></div>
          <div><dt>Type</dt><dd id="spec-type"></dd></div>
        </dl>
      </div>

      <div class="panel-block">
        <p class="label">布局参数</p>
        <textarea id="layout-export" class="layout-export" readonly spellcheck="false"></textarea>
        <p class="helper-text">把这里的参数直接发回给我，我就按这组值回译到 LVGL。</p>
      </div>
    </section>

    <section class="preview-panel">
      <div class="watch-preview">
        <div class="watch-shell">
          <div id="watch-screen" class="watch-screen">
            <div id="surface-stage" class="surface-stage">
              <section id="hero-card" class="hero-card editable-node" data-node="heroCard" data-label="天气卡">
                <span class="edit-handle" aria-hidden="true"></span>
                <div id="temperature-node" class="text-node text-node-temperature editable-node" data-node="temperature" data-label="温度文字">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <span class="temperature-text">23C</span>
                </div>
                <div id="range-node" class="text-node text-node-range editable-node" data-node="range" data-label="温区文字">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <span class="range-text">30C / 18C</span>
                </div>
                <div id="weather-icon-slot" class="icon-slot editable-node editable-node-icon" data-node="weatherIcon" data-label="天气图标">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <img
                    id="weather-icon-image"
                    class="weather-icon-image"
                    src="../../../assets/generated_icons/weather_cloud_sun.png"
                    alt="Weather icon">
                  <div id="weather-icon-fallback" class="weather-icon-fallback is-hidden" aria-hidden="true">
                    <span class="sun"></span>
                    <span class="cloud cloud-back"></span>
                    <span class="cloud cloud-front"></span>
                  </div>
                </div>
              </section>

              <section id="sleep-card" class="metric-card metric-card-sleep editable-node" data-node="sleepCard" data-label="睡眠卡">
                <span class="edit-handle" aria-hidden="true"></span>
                <div id="sleep-icon-slot" class="metric-icon-slot editable-node editable-node-icon" data-node="sleepIcon" data-label="睡眠图标">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <img
                    id="sleep-icon-image"
                    class="metric-icon-image"
                    src="../../../assets/generated_icons/sleep_bed.png"
                    alt="Sleep icon">
                  <div id="sleep-icon-fallback" class="metric-icon metric-icon-sleep is-hidden" aria-hidden="true">
                    <span class="bed-frame"></span>
                    <span class="bed-head"></span>
                    <span class="bed-pillow"></span>
                  </div>
                </div>
                <div id="sleep-value-node" class="text-node text-node-metric-value editable-node" data-node="sleepValue" data-label="睡眠数值">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <span class="metric-value-text">7h 36m</span>
                </div>
              </section>

              <section id="steps-card" class="metric-card metric-card-steps editable-node" data-node="stepsCard" data-label="步数卡">
                <span class="edit-handle" aria-hidden="true"></span>
                <div id="steps-icon-slot" class="metric-icon-slot editable-node editable-node-icon" data-node="stepsIcon" data-label="步数图标">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <img
                    id="steps-icon-image"
                    class="metric-icon-image"
                    src="../../../assets/generated_icons/steps_foot.png"
                    alt="Steps icon">
                  <div id="steps-icon-fallback" class="metric-icon metric-icon-steps is-hidden" aria-hidden="true">
                    <span class="foot-main"></span>
                    <span class="toe toe-1"></span>
                    <span class="toe toe-2"></span>
                    <span class="toe toe-3"></span>
                  </div>
                </div>
                <div id="steps-value-node" class="text-node text-node-metric-value editable-node" data-node="stepsValue" data-label="步数数值">
                  <span class="edit-handle" aria-hidden="true"></span>
                  <span class="metric-value-text">7645</span>
                </div>
              </section>
            </div>

            <div class="pager" aria-hidden="true">
              <span class="pager-dot"></span>
              <span class="pager-dot"></span>
              <span class="pager-dot"></span>
              <span class="pager-dot pager-dot-active"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="status-row">
        <span id="weather-icon-status" class="status-pill">天气图标：占位图形</span>
        <span id="sleep-icon-status" class="status-pill">睡眠图标：占位图形</span>
        <span id="steps-icon-status" class="status-pill">步数图标：占位图形</span>
        <span id="edit-status" class="status-pill">编辑模式：关闭</span>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
