; T-Watch S3 Plus minimal bring-up for Magic Watch hardware frontier validation.
; Scope: serial logs, 240x240 display, and one minimal LVGL screen.

[platformio]
default_envs = twatch-s3
boards_dir = board/LilyGoWatch-S3

[env:twatch-s3]
platform = espressif32@6.3.0
framework = arduino
board = LilyGoWatch-S3

upload_speed = 921600
monitor_speed = 115200
board_build.filesystem = fatfs
board_build.partitions = app3M_fat9M_16MB.csv

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -Wnarrowing
    -include extras/Setup212_LilyGo_T_Watch_S3.h
    -DUSER_SETUP_LOADED
    -DLV_CONF_INCLUDE_SIMPLE
    -I src
    -DRADIOLIB_EXCLUDE_NRF24
    -DRADIOLIB_EXCLUDE_RF69
    -DRADIOLIB_EXCLUDE_SX1231
    -DRADIOLIB_EXCLUDE_SI443X
    -DRADIOLIB_EXCLUDE_RFM2X
    -DRADIOLIB_EXCLUDE_SX127X
    -DRADIOLIB_EXCLUDE_AFSK
    -DRADIOLIB_EXCLUDE_AX25
    -DRADIOLIB_EXCLUDE_HELLSCHREIBER
    -DRADIOLIB_EXCLUDE_MORSE
    -DRADIOLIB_EXCLUDE_RTTY
    -DRADIOLIB_EXCLUDE_SSTV
    -DRADIOLIB_EXCLUDE_DIRECT_RECEIVE
    -DRADIOLIB_EXCLUDE_APRS
    -DRADIOLIB_EXCLUDE_BELL
    -DMW_BRINGUP_SKIP_I2C_SCAN
    -DMW_BRINGUP_SKIP_GPS_PROBE

lib_deps =
    bodmer/TFT_eSPI @ 2.5.43
    lvgl/lvgl @ 8.4.0
    lewisxhe/XPowersLib @ 0.2.4
    lewisxhe/SensorLib @ 0.1.8
    jgromes/RadioLib @ 7.1.0
